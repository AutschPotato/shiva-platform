worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    # --- Performance tuning ---
    access_log off;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    client_max_body_size 16m;
    client_body_buffer_size 512k;

    keepalive_timeout 300s;
    keepalive_requests 100000;

    # --- Upstream: dummy target instances ---
    upstream targets {
        least_conn;
        keepalive 256;

        server dummy1:8090;
        server dummy2:8090;
        server dummy3:8090;
        server dummy4:8090;
        server dummy5:8090;
        server dummy6:8090;
        server dummy7:8090;
        server dummy8:8090;
        server dummy9:8090;
        server dummy10:8090;
    }

    server {
        listen 8090;

        location / {
            proxy_pass http://targets;
            proxy_http_version 1.1;
            # Stream request bodies directly to the dummy targets so payload-heavy
            # tests are not bottlenecked by nginx temp-file buffering.
            proxy_request_buffering off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
